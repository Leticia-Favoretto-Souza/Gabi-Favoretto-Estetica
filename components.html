<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Organic Luxury Design System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1>Organic Luxury</h1>

        <p>Design System • Gabi Favoretto</p>

    </div>

    <section class="mb-5 fade-up">

        <h2 class="mb-4">
            Paleta de Cores
        </h2>

        <div class="row g-4">

            <div class="col-md-3">

                <div class="color-card bg-white">

                    <div class="color-preview" style="background:#F8F4EF"></div>

                    <h5>Background</h5>

                    <small>#F8F4EF</small>

                </div>

            </div>

            <div class="col-md-3">

                <div class="color-card bg-white">

                    <div class="color-preview" style="background:#B88968"></div>

                    <h5>Primary</h5>

                    <small>#B88968</small>

                </div>

            </div>

            <div class="col-md-3">

                <div class="color-card bg-white">

                    <div class="color-preview" style="background:#4B3B32"></div>

                    <h5>Titles</h5>

                    <small>#4B3B32</small>

                </div>

            </div>

            <div class="col-md-3">

                <div class="color-card bg-white">

                    <div class="color-preview" style="background:#EFE6DC"></div>

                    <h5>Sections</h5>

                    <small>#EFE6DC</small>

                </div>

            </div>

        </div>

    </section>

    <section class="mb-5 fade-up">

        <h2 class="mb-4">
        Tipografia
        </h2>

        <h1>Heading 1</h1>

        <h2>Heading 2</h2>

        <h3>Heading 3</h3>

        <p>

        Lorem ipsum dolor sit amet, consectetur adipiscing elit.

        </p>

    </section>

    <section class="mb-5 fade-up">

        <h2 class="mb-4">
        Botões
        </h2>

        <button class="btn-primary-custom">

        Agendar Horário

        </button>

        <button class="btn-outline-custom ms-3">

        Saiba Mais

        </button>

    </section>

    <!-- Aqui vão as seções -->

</div>

<script src="assets/js/app.js"></script>

</body>

</html>
